name: ci

# §6.5 referee: full gate from a clean checkout, with MinIO + the real
# litestream binary provisioned for integration/differential tests.
on:
  push:
  pull_request:

env:
  LITESTREAM_VERSION: "0.5.11" # PLAN.md D-2
  CARGO_TERM_COLOR: always
  # S3-compatible test endpoint (MinIO). object_store reads these for the S3 client.
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_REGION: us-east-1
  AWS_ENDPOINT: http://127.0.0.1:9000
  AWS_ALLOW_HTTP: "true"
  # The MinIO integration tests (tests/integration_minio.rs) read these exact
  # variable names; the bucket must match what we create below (default is
  # `litestream`). Mismatched names previously left the tests looking for a
  # bucket that did not exist (NoSuchBucket).
  RUSTYRIVER_MINIO_ENDPOINT: http://127.0.0.1:9000
  RUSTYRIVER_MINIO_BUCKET: litestream

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # guards.sh diffs against the base

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Start MinIO
        # `services:` can't override MinIO's `server` arg, so run it directly.
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e "MINIO_ROOT_USER=$AWS_ACCESS_KEY_ID" \
            -e "MINIO_ROOT_PASSWORD=$AWS_SECRET_ACCESS_KEY" \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/live && break
            sleep 1
          done

      - name: Create test bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$RUNNER_TEMP/mc"
          chmod +x "$RUNNER_TEMP/mc"
          "$RUNNER_TEMP/mc" alias set local "$AWS_ENDPOINT" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
          "$RUNNER_TEMP/mc" mb -p "local/$RUSTYRIVER_MINIO_BUCKET"

      - name: Install Go (to build the pinned litestream from source)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install litestream from source (differential oracle, D-3)
        run: |
          # benbjohnson/litestream publishes no prebuilt linux-amd64 asset for
          # v${LITESTREAM_VERSION}, so build the pinned binary from source (the
          # same way the local dev environment does). Go's toolchain directive in
          # litestream's go.mod auto-selects the exact compiler it needs.
          go install "github.com/benbjohnson/litestream/cmd/litestream@v${LITESTREAM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/litestream" version

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --all-features

      - name: test
        run: cargo test --all --all-features

  guards:
    # Anti-gaming checks (PLAN.md §6.5 / AGENTS.md rules 1-3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run guards
        run: bash scripts/guards.sh "${{ github.event.pull_request.base.sha || github.event.before }}"
